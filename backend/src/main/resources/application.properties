# AuroraAI Spring Boot Configuration

# Server Configuration
server.port=8080
server.servlet.context-path=/

# H2 Database Configuration
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# JPA Configuration
spring.jpa.show-sql=true
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

# Application Configuration
spring.application.name=AuroraAI
logging.level.com.auroraa=DEBUG

# AI Configuration (DeepSeek) - Use environment variable
ai.api-key=${DEEPSEEK_API_KEY:sk-0f023ec8ea2b47f190910d2582549e8d}
ai.provider=deepseek
ai.model=deepseek-chat
ai.base-url=https://api.deepseek.com/v1
