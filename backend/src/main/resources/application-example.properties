# AuroraAI Configuration Example
# Copy this file to application.properties and fill in your values

# Server Configuration
server.port=8080
server.servlet.context-path=/

# H2 Database Configuration
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# JPA Configuration
spring.jpa.show-sql=true
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

# Application Configuration
spring.application.name=AuroraAI
logging.level.com.auroraa=DEBUG

# AI Configuration (DeepSeek)
# Get your API key from https://platform.deepseek.com/
ai.api-key=YOUR_DEEPSEEK_API_KEY_HERE
ai.provider=deepseek
ai.model=deepseek-chat
ai.base-url=https://api.deepseek.com/v1
